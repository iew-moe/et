<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Übung: Single-Choice Aufgabensammlung</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 20px; background: #fafafa; }
    .row { display: flex; gap: 8px; align-items: center; margin: 6px 0; flex-wrap: wrap; }
    .label { width: 260px; font-weight: 600; }
    input { width: 160px; padding: 4px 6px; }
    .card { border: 1px solid #ddd; border-radius: 8px; background: #fff; padding: 12px; margin: 10px 0; }
    .small { font-size: 0.9em; color: #555; }
    .section-title { font-weight: 700; margin-bottom: 8px; }
    .question { border: 1px solid #e3e3e3; border-radius: 8px; background: #fff; padding: 10px 12px; margin: 10px 0; }
    .question.ok { outline: 2px solid #2e7d32; }
    .question.bad { outline: 2px solid #c62828; }
    .q-text { font-weight: 600; margin-bottom: 6px; }
    .opt { display: block; margin: 4px 0; cursor: pointer; border-radius: 6px; padding: 2px 6px; }
    .opt input { width: auto; margin-right: 8px; }
    .opt.opt-ok { background: #e6f4ea; outline: 1.5px solid #2e7d32; }
    .opt.opt-bad { background: #fdecea; outline: 1.5px solid #c62828; }
    .question.locked .opt { cursor: default; color: #444; }
    .expl { margin-top: 6px; padding: 6px 8px; background: #eef4fb; border-radius: 6px; }
    .expl.expl-ok { background: #e6f4ea; }
    .topic { font-size: 0.8em; color: #777; float: right; }
    .topic-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .topic-chip { border: 1px solid #d0d7de; border-radius: 14px; padding: 2px 10px; font-size: 0.85em; background: #fff; }
    .topic-chip.done { background: #e6f4ea; border-color: #2e7d32; }
  </style>
  <link rel="stylesheet" href="../shared/tutor.css" />
  <script defer src="https://cloud.umami.is/script.js" data-website-id="fe2809e9-3433-432f-be27-22f206dfcfae"></script>
</head>
<body>
  <p><a href="../index.html">Zur Übungsübersicht</a></p>
  <h2 id="main-title">Übung: Single-Choice Aufgabensammlung [... loading ...]</h2>
  <div class="row">
    <label class="label" id="lbl-lang">Sprache:</label>
    <select id="lang">
      <option value="de">Deutsch</option>
      <option value="en">English</option>
    </select>
  </div>
  <div class="row">
    <label class="label" id="lbl-seed">Seed:</label>
    <input id="seed" autocomplete="off" />
    <button id="gen-seed">Generieren (Seed)</button>
    <button id="gen-random">Generieren (Random)</button>
  </div>

  <div id="values" class="card"></div>
  <div id="topic-panel" class="card"></div>
  <div id="tasks"></div>

  <button id="show-solution">Musterlösung anzeigen</button>
  <div id="check-status" class="small" style="margin-top:6px;"></div>

  <div class="small" style="margin-top:16px;">© 2026 Stefan Mönch – CC BY-NC 4.0</div>
  <div style="margin-top:10px;">
    <a href="https://github.com/iew-moe/et" target="_blank" rel="noopener noreferrer">
      <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
           alt="GitHub Repo" width="30" height="30" style="vertical-align: middle;" />
    </a>
  </div>

  <script src="app.js"></script>
  <script>
    window.ET_TUTOR_CONFIG = {
      exerciseId: "single_choice",
      exerciseTitle: "Single-Choice Aufgabensammlung",
      workerUrl: "https://et-tutor.stefan-moench.workers.dev",
      formulaSheetUrl: "../Formelsammlung_ET1.html"
    };
  </script>
  <script src="../shared/tutor.js"></script>
</body>
</html>
